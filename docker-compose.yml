version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: datapulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: datapulse
      DB_USER: postgres
      DB_PASSWORD: postgres
      API_KEY: datapulse-dev-key-2024
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn src.api.app_with_genai:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: datapulse
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0

  pipeline:
    build: .
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: datapulse
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    command: python scripts/run_pipeline.py
    profiles:
      - pipeline

volumes:
  pgdata:
