name: DataPulse AI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datapulse_test
  DB_NAME: datapulse_test
  API_KEY: test-api-key

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datapulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic data
        run: python -m src.etl.generate_data

      - name: Initialize database and run ETL
        run: |
          python -c "from src.etl.database import init_database, create_schema; init_database(); create_schema()"
          python -m src.etl.pipeline

      - name: Run data quality checks
        run: python -c "from src.data_quality.dq_engine import run_all_dq_checks; run_all_dq_checks('latest')"

      - name: Run API tests
        run: pytest tests/api_tests/ -v --tb=short

      - name: Run SQL validation tests
        run: pytest tests/sql_tests/ -v --tb=short

      - name: Start API server and run Newman tests
        run: |
          pip install uvicorn
          uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          npx newman run tests/postman/DataPulse_AI_API.postman_collection.json \
            --env-var "base_url=http://localhost:8000" \
            --env-var "api_key=test-api-key" \
            --reporters cli

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install flake8
      - run: flake8 src/ --max-line-length=120 --ignore=E501,W503,E402
